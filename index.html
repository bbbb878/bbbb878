<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逼寶預測排行榜 · 2026/06/30</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>:root{
  --bg:#0c0a13; --panel:#141019; --raised:#1b1626; --line:#2a2438;
  --purple:#a970ff; --purple-deep:#6c3ff0;
  --mint:#2ce4b8; --coral:#ff5d73; --gold:#ffcb52;
  --silver:#cdd2dc; --bronze:#d98f54;
  --text:#efedf5; --muted:#8f8aa3;
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:"Noto Sans TC","Space Grotesk",system-ui,sans-serif;
  line-height:1.45; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 420px at 50% -120px, rgba(108,63,240,.22), transparent 70%),
    radial-gradient(600px 300px at 100% 0, rgba(44,228,184,.05), transparent 70%);
}
.num{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.gain{color:var(--mint)} .loss{color:var(--coral)}
.wrap{max-width:1080px;margin:0 auto;padding:28px 18px 60px}

/* 頁首 */
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.brand{display:flex;flex-direction:column;gap:6px}
.kicker{display:flex;align-items:center;gap:8px;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:700}
.live{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 0 rgba(44,228,184,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(44,228,184,.5)}70%{box-shadow:0 0 0 7px rgba(44,228,184,0)}100%{box-shadow:0 0 0 0 rgba(44,228,184,0)}}
h1{margin:0;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:2rem;letter-spacing:-.02em}
h1 .accent{color:var(--purple)}
.datebox{text-align:right}
.datebox .d{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.15rem}
.datebox .u{font-size:.72rem;color:var(--muted);margin-top:2px}
.nav{display:flex;gap:8px;margin-bottom:24px}
.nav a{font-size:.82rem;font-weight:700;text-decoration:none;color:var(--muted);border:1px solid var(--line);padding:7px 14px;border-radius:999px;transition:.15s}
.nav a:hover{color:var(--text);border-color:var(--purple)}
.nav a.active{color:#1a1320;background:var(--purple);border-color:var(--purple)}

/* 統計 chips */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.chip .l{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.chip .v{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:1.5rem;margin-top:4px}

/* 英雄對決 */
.hero{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:14px;margin-bottom:30px}
.hero-card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 24px;overflow:hidden}
.hero-card::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none}
.hero-win::before{background:radial-gradient(120% 100% at 0 0,rgba(44,228,184,.16),transparent 55%)}
.hero-loss::before{background:radial-gradient(120% 100% at 100% 0,rgba(255,93,115,.16),transparent 55%)}
.hero-win{border-color:rgba(44,228,184,.35)} .hero-loss{border-color:rgba(255,93,115,.35)}
.hero-loss{text-align:right}
.hero-eyebrow{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:8px;position:relative}
.hero-loss .hero-eyebrow{justify-content:flex-end}
.hero-win .hero-eyebrow i{color:var(--gold)} .hero-loss .hero-eyebrow i{color:var(--coral)}
.hero-name{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1.5rem;margin:10px 0 6px;position:relative}
.hero-figure{font-weight:800;font-size:2.6rem;line-height:1;letter-spacing:-.02em;position:relative}
.hero-win .hero-figure{color:var(--mint);text-shadow:0 0 26px rgba(44,228,184,.35)}
.hero-loss .hero-figure{color:var(--coral);text-shadow:0 0 26px rgba(255,93,115,.3)}
.hero-meta{display:flex;gap:16px;margin-top:14px;font-size:.8rem;color:var(--muted);position:relative}
.hero-loss .hero-meta{justify-content:flex-end}
.hero-vs{display:flex;align-items:center;justify-content:center;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:1rem;color:var(--muted);letter-spacing:.1em;min-width:34px}
.hero-card.is-empty{display:flex;flex-direction:column;justify-content:center}
.hero-empty{color:var(--muted);font-size:1rem;margin-top:10px}

/* 排行榜卡 */
.boards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.board{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.board.full{grid-column:1/-1}
.board-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line)}
.board-head .ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.board-head h2{margin:0;font-family:"Space Grotesk",sans-serif;font-size:1.05rem;font-weight:700;flex:1}
.board-head .count{font-family:"JetBrains Mono",monospace;font-size:.75rem;color:var(--muted)}
.ico.win{background:rgba(44,228,184,.12);color:var(--mint)}
.ico.loss{background:rgba(255,93,115,.12);color:var(--coral)}
.ico.hot{background:rgba(169,112,255,.14);color:var(--purple)}

.row{display:grid;grid-template-columns:38px 1fr auto;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid rgba(42,36,56,.6);
  animation:rise .5s ease both;animation-delay:calc(var(--i,0)*45ms)}
.row:last-child{border-bottom:none}
.row:hover{background:var(--raised)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.rank{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:1.05rem;text-align:center;color:var(--muted)}
.rank-1{color:var(--gold)} .rank-2{color:var(--silver)} .rank-3{color:var(--bronze)}
.who .name{font-weight:700;font-size:.98rem;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.who .sub,.val .sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.val{text-align:right}
.val .num{font-weight:800;font-size:1.05rem}
.val .unit{font-size:.72rem;color:var(--muted);font-weight:500}
.champ-ico{font-size:.78rem;color:var(--gold)}
.row.is-champion{background:linear-gradient(90deg,rgba(169,112,255,.10),transparent 60%)}
.board.win .row.is-champion{background:linear-gradient(90deg,rgba(44,228,184,.10),transparent 60%)}
.board.loss .row.is-champion{background:linear-gradient(90deg,rgba(255,93,115,.10),transparent 60%)}
.row.is-champion .rank{font-size:1.2rem}
.medal{font-size:.62rem;font-weight:900;padding:2px 7px;border-radius:20px;color:#000}
.medal-1{background:var(--gold)} .medal-2{background:var(--silver)} .medal-3{background:var(--bronze)}
.empty{padding:34px 20px;text-align:center;color:var(--muted);font-size:.9rem}

footer{margin-top:34px;text-align:center;color:var(--muted);font-size:.74rem;line-height:1.7}

@media (max-width:760px){
  h1{font-size:1.55rem}
  .stats{grid-template-columns:repeat(2,1fr)}
  .hero{grid-template-columns:1fr}
  .hero-loss{text-align:left}
  .hero-loss .hero-eyebrow,.hero-loss .hero-meta{justify-content:flex-start}
  .hero-vs{display:none}
  .boards{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  .row{animation:none}.live{animation:none}
}</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="kicker"><span class="live"></span> Live · 每60分鐘重置 · 數據僅供參考</div>
      <h1>逼寶當日<span class="accent">預測</span>排行榜</h1>
    </div>
    <div class="datebox">
      <div class="d">2026/06/30 <span style="color:var(--muted);font-weight:500">週二</span></div>
      <div class="u">更新於 12:14:17</div>
    </div>
  </div>

  <div class="nav">
    <a href="index.html" class="active">賭盤損益</a>
    <a href="levels.html">等級排行</a>
  </div>

  <div class="stats">
    <div class="chip"><div class="l">參與用戶</div><div class="v">0</div></div>
    <div class="chip"><div class="l">總注單</div><div class="v">0</div></div>
    <div class="chip"><div class="l">總投入點數</div><div class="v">0</div></div>
    <div class="chip"><div class="l">預測場次</div><div class="v">0</div></div>
  </div>

  <div class="hero">
    <div class='hero-card hero-win is-empty'>
                  <div class='hero-eyebrow'>今日最大贏家</div>
                  <div class='hero-empty'>今日尚無資料</div>
                </div>
    <div class="hero-vs">VS</div>
    <div class='hero-card hero-loss is-empty'>
                  <div class='hero-eyebrow'>今日最大輸家</div>
                  <div class='hero-empty'>今日尚無資料</div>
                </div>
  </div>

  <div class="boards">
    <div class="board win">
      <div class="board-head">
        <div class="ico win"><i class="fas fa-arrow-trend-up"></i></div>
        <h2>盈利排行</h2><span class="count">TOP 10</span>
      </div>
      <div class='empty'>今日尚無盈利紀錄</div>
    </div>
    <div class="board loss">
      <div class="board-head">
        <div class="ico loss"><i class="fas fa-arrow-trend-down"></i></div>
        <h2>虧損排行</h2><span class="count">TOP 10</span>
      </div>
      <div class='empty'>今日尚無虧損紀錄</div>
    </div>
  </div>

  <div class="boards">
    <div class="board full">
      <div class="board-head">
        <div class="ico hot"><i class="fas fa-fire"></i></div>
        <h2>熱門投注選項</h2><span class="count">TOP 10</span>
      </div>
      <div class='empty'>今日尚無投注紀錄</div>
    </div>
  </div>

  <footer>
    資料更新於 2026/06/30 12:14:17 · 僅統計當日預測<br>
  </footer>

</div>
</body>
</html>
